name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-timeout
    
    - name: Run tests with coverage
      working-directory: backend
      run: |
        pytest -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=45
    
    - name: Upload coverage to PR
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: backend/coverage.xml
    
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('coverage.xml', 'utf8');
          const coverageMatch = coverage.match(/line-rate="([0-9.]+)"/);
          const percentage = coverageMatch ? Math.round(parseFloat(coverageMatch[1]) * 100) : 'unknown';
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📊 Coverage Report\n\n**Coverage: ${percentage}%**\n\n${
              parseFloat(percentage) >= 85 
              ? '✅ Meets 85% threshold' 
              : '⚠️ Below 85% threshold - build will fail'
            }`
          });