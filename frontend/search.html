<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar - Agenda de la zona</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/api.js"></script>
  <script src="/js/geo.js"></script>
  <script src="/js/app.js"></script>
  <style>
    #searchMap { height: 400px; border-radius: 0.5rem; z-index: 1; }
    .search-tab.active { background-color: #2563eb; color: white; }
    .search-tab { transition: all 0.2s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="breadcrumbs"></div>
    <!-- Búsqueda Tabs -->
    <div class="mb-8">
      <!-- Universal Search Bar -->
      <div class="flex gap-4 max-w-2xl mb-8">
        <div class="flex-1">
          <input
            type="text"
            id="searchInput"
            aria-label="Buscar contactos por nombre, teléfono o ciudad"
            placeholder="Buscar por nombre, teléfono o ciudad..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
        </div>
        <button
          onclick="doSearch()"
          class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium flex items-center gap-2"
        >
          🔍 Buscar
        </button>
      </div>

      <!-- Discovery Tabs -->
      <div class="flex gap-2 mb-6 border-b">
        <button 
          onclick="switchTab('text')" 
          id="tab-text" 
          class="search-tab active px-6 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600 transition-all"
        >
          📄 Resultados
        </button>
        <button 
          onclick="switchTab('geo')" 
          id="tab-geo" 
          class="search-tab px-6 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-all"
        >
          📍 Cerca de mí (Mapa)
        </button>
      </div>

      <!-- Tab Panels -->
      <div id="panel-text" class="block">
        <!-- Text search results are handled by contactsGrid BELOW -->
      </div>

      <div id="panel-geo" class="hidden">
        <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-4 flex flex-wrap gap-4 items-center justify-between">
          <div class="flex items-center gap-4">
            <button
              onclick="geoSearch()"
              id="geoSearchBtn"
              class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition flex items-center gap-2 font-medium"
            >
              🎯 Actualizar ubicación
            </button>
            <div class="flex items-center gap-2">
              <label for="radiusSelect" class="text-sm font-medium text-gray-700">Radio:</label>
              <select id="radiusSelect" class="px-3 py-2 border rounded-lg text-sm bg-white">
                <option value="1">1 km</option>
                <option value="3">3 km</option>
                <option value="5">5 km</option>
                <option value="10" selected>10 km</option>
                <option value="20">20 km</option>
                <option value="50">50 km</option>
              </select>
            </div>
          </div>
          <span id="geoStatus" class="text-sm text-blue-700 font-medium"></span>
        </div>
        <div id="searchMap" data-lazy-map="true" class="mb-6 shadow-sm border border-gray-200"></div>
      </div>
    </div>

    <div id="resultsInfo" class="mb-4 text-gray-600"></div>
    <div id="contactDetail" class="hidden mb-8"></div>
    <div id="contactsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Cargado vía JS -->
    </div>
    <div id="pagination" class="mt-4"></div>
    <div id="noResults" class="hidden">
    </div>
  </main>

  <script>
    // --- Tab switching ---
    let map = null;
    let activeTab = 'text';

    function switchTab(tab) {
      // Toggle logic: if clicking the active geo tab, go back to text
      if (tab === 'geo' && activeTab === 'geo') {
        tab = 'text';
      }
      
      activeTab = tab;
      ['text', 'geo'].forEach(t => {
        const panel = document.getElementById(`panel-${t}`);
        const tabBtn = document.getElementById(`tab-${t}`);
        const isActive = (t === tab);
        
        if (panel) panel.classList.toggle('hidden', !isActive);
        if (tabBtn) {
          // Toggle active classes
          tabBtn.classList.toggle('border-blue-600', isActive);
          tabBtn.classList.toggle('text-blue-600', isActive);
          // Toggle inactive classes
          tabBtn.classList.toggle('border-transparent', !isActive);
          tabBtn.classList.toggle('text-gray-500', !isActive);
        }
      });

      // Initialize map lazily when geo tab is first shown
      if (tab === 'geo' && !map) {
        // Auto-load Leaflet when geo tab is shown (not waiting for click)
        const mapContainer = document.getElementById('searchMap');
        mapContainer.innerHTML = '<div class="map-loading">Cargando mapa...</div>';
        window.LazyLoadingUtility.loadLeaflet().then(() => {
          map = window.L.map('searchMap').setView([-32.862574, -60.759585], 12);
          if (typeof setupAccessibilityFocusManagement === 'function') {
            setupAccessibilityFocusManagement(map);
          }
          window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);
          mapContainer.dataset.mapInitialized = 'true';
        }).catch(err => {
          mapContainer.innerHTML = '<div class="map-placeholder">Error al cargar mapa</div>';
          console.error('Failed to load map:', err);
        });
      }
    }

    // --- Text search ---
    function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams(window.location.search);
      
      if (query) {
        params.set('q', query);
      } else {
        params.delete('q');
      }

      // If we are in geo mode, we stay in geo mode but with new text filter
      if (activeTab === 'geo') {
        const status = document.getElementById('geoStatus');
        status.textContent = 'Actualizando búsqueda...';
        geoSearch();
        
        // Update URL without reload to preserve state
        const newUrl = `${window.location.pathname}?${params.toString()}`;
        window.history.replaceState({path: newUrl}, '', newUrl);
      } else {
        // In text mode, we do a full search (redirect to ensure clean state or use searchByQuery)
        window.location.href = `/search?${params.toString()}`;
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    // --- Geo search ---
    function initSearchMap() {
      // Use LazyLoadingUtility to load Leaflet on demand
      const mapContainer = document.getElementById('searchMap');
      
      // Add click handler to load map on demand
      mapContainer.style.cursor = 'pointer';
      mapContainer.addEventListener('click', async function() {
        if (mapContainer.dataset.mapInitialized === 'true') return;
        
        mapContainer.dataset.mapClicked = 'true';
        mapContainer.innerHTML = '<div class="map-loading">Cargando mapa...</div>';
        
        try {
          await window.LazyLoadingUtility.loadLeaflet();
          map = window.L.map('searchMap').setView([-32.862574, -60.759585], 12);
          if (typeof setupAccessibilityFocusManagement === 'function') {
            setupAccessibilityFocusManagement(map);
          }
          window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);
          mapContainer.dataset.mapInitialized = 'true';
        } catch (err) {
          mapContainer.innerHTML = '<div class="map-placeholder">Error al cargar mapa</div>';
          console.error('Failed to load map:', err);
        }
      }, { once: true });
    }

    async function geoSearch() {
      const btn = document.getElementById('geoSearchBtn');
      const status = document.getElementById('geoStatus');
      const radius = parseFloat(document.getElementById('radiusSelect').value);

      // Auto-initialize map if not already done
      if (!map && activeTab !== 'geo') {
        switchTab('geo');
      }
      
      try {
        // Poll until map is ready
        let retries = 0;
        while (!map && retries < 30) {
          await new Promise(r => setTimeout(r, 100));
          retries++;
        }
        
        if (!map) {
          throw new Error('No se pudo inicializar el mapa');
        }
        
        const pos = await getUserLocation();
        status.textContent = `📍 Ubicación obtenida. Buscando en radio de ${radius} km...`;

        // Combine with current filters
        const query = document.getElementById('searchInput').value.trim();
        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('category');

        // Show user location and radius on map
        addUserLocationMarker(map, pos.lat, pos.lon);
        addRadiusCircle(map, pos.lat, pos.lon, radius);
        map.setView([pos.lat, pos.lon], 13);

        // Search via API (combined)
        const data = await searchContactsGeo(pos.lat, pos.lon, radius, query, categoryId);
        const contacts = data.contacts || data;
        let statusMsg = `✅ ${contacts.length} resultado${contacts.length !== 1 ? 's' : ''}`;
        if (query) statusMsg += ` para "${query}"`;
        status.textContent = statusMsg;

        renderContacts(contacts);

        // Add markers to map
        if (map && contacts.length > 0) {
          addContactMarkers(map, contacts);
          fitMapToContacts(map, contacts);
        }
      } catch (err) {
        status.textContent = `❌ ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '📍 Buscar cerca de mí';
      }
    }

    // --- Load results based on URL params ---
    async function loadResults() {
      const params = new URLSearchParams(window.location.search);
      const query = params.get('q');
      const categoryId = params.get('category');
      const contactId = params.get('contact');
      const lat = params.get('lat');
      const lon = params.get('lon');

      if (query) {
        document.getElementById('searchInput').value = query;
      }

      if (contactId) {
        await loadContactDetail(contactId);
        return;
      }

      // Geo search via URL params
      if (lat && lon) {
        switchTab('geo');
        const radius = parseFloat(params.get('radius_km') || '10');
        document.getElementById('radiusSelect').value = radius;
        document.getElementById('geoStatus').textContent = 'Buscando con filtros aplicados...';
        try {
          // Combined search on load
          const data = await searchContactsGeo(parseFloat(lat), parseFloat(lon), radius, query, categoryId);
          const contacts = data.contacts || data;
          document.getElementById('geoStatus').textContent = `${contacts.length} resultado${contacts.length !== 1 ? 's' : ''}`;
          renderContacts(contacts);
          
          // Ensure map is initialized even on direct load
          if (!map) {
             // This will be handled by switchTab('geo') lazy init, but we might need to wait
             let waitCount = 0;
             while (!map && waitCount < 20) {
               await new Promise(r => setTimeout(r, 100));
               waitCount++;
             }
          }

          if (map) {
            addUserLocationMarker(map, parseFloat(lat), parseFloat(lon));
            addRadiusCircle(map, parseFloat(lat), parseFloat(lon), radius);
            if (contacts.length > 0) {
              addContactMarkers(map, contacts);
              fitMapToContacts(map, contacts);
            }
          }
        } catch (err) {
          document.getElementById('geoStatus').textContent = `Error: ${err.message}`;
        }
        return;
      }

      if (query) {
        await searchByQuery(query);
        return;
      }

      if (categoryId) {
        await searchByCategory(categoryId);
        return;
      }

      await loadAllContacts();
    }

    async function loadContactDetail(id) {
      try {
        const contact = await getContact(id);
        const categories = await getCategories();
        const category = categories.find(c => c.id === contact.category_id);
        const grid = document.getElementById('contactsGrid');
        grid.classList.add('hidden');

        const s = escapeHtml;
        document.getElementById('contactDetail').classList.remove('hidden');
        document.getElementById('contactDetail').innerHTML = `
          <div class="bg-white rounded-lg shadow-sm border p-6 max-w-lg">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h2 class="text-2xl font-bold text-gray-800">${s(contact.name)}</h2>
                ${category ? `<div class="text-sm text-blue-600 mt-1">${getCategoryEmoji(category.code)} ${s(category.name)}</div>` : ''}
              </div>
              ${contact.verification_level >= 3 ? '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-sm rounded">⭐ Premium</span>' :
                contact.verification_level >= 2 ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-sm rounded">✓ Documentado</span>' :
                contact.verification_level >= 1 ? '<span class="px-2 py-1 bg-blue-100 text-blue-700 text-sm rounded">✓ Verificado</span>' : ''}
            </div>
            ${contact.photo_path ? `<img src="${s(contact.photo_path)}" alt="${s(contact.name)}" class="w-full h-48 object-cover rounded-lg mb-4">` : ''}
            <div class="space-y-3">
              <div class="flex items-center gap-3">
                <span class="text-gray-500">📞</span>
                <a href="tel:${s(contact.phone)}" class="text-blue-600 hover:underline">${s(contact.phone)}</a>
              </div>
              ${contact.email ? `<div class="flex items-center gap-3"><span class="text-gray-500">✉️</span><a href="mailto:${s(contact.email)}" class="text-blue-600 hover:underline">${s(contact.email)}</a></div>` : ''}
              ${contact.schedule ? `<div class="flex items-center gap-3"><span class="text-gray-500">🕐</span><span>${s(contact.schedule)}</span></div>` : ''}
              ${contact.address ? `<div class="flex items-center gap-3"><span class="text-gray-500">📍</span><span>${s(contact.address)}</span></div>` : ''}
              ${contact.city ? `<div class="flex items-center gap-3"><span class="text-gray-500">🏙️</span><span>${s(contact.city)}${contact.neighborhood ? ' - ' + s(contact.neighborhood) : ''}</span></div>` : ''}
              ${contact.website ? `<div class="flex items-center gap-3"><span class="text-gray-500">🌐</span><a href="${s(contact.website)}" target="_blank" class="text-blue-600 hover:underline">${s(contact.website)}</a></div>` : ''}
              ${contact.maps_url ? `<div class="flex items-center gap-3"><span class="text-gray-500">🗺️</span><a href="${s(contact.maps_url)}" target="_blank" class="text-blue-600 hover:underline">Ver en Google Maps</a></div>` : ''}
              ${contact.description ? `<div class="flex items-start gap-3"><span class="text-gray-500">📝</span><span>${s(contact.description)}</span></div>` : ''}
            </div>
            <div class="flex gap-4 mt-6">
              <a href="/search" class="text-blue-600 hover:underline">← Volver a la búsqueda</a>
              <a href="/contact-form?id=${contact.id}" class="text-blue-600 hover:underline">✏️ Editar</a>
              ${isLoggedIn() ? `<a href="/history?id=${contact.id}" class="text-gray-600 hover:underline">Ver historial</a>` : ''}
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          `<div class="text-red-500 col-span-full">Error: ${err.message}</div>`;
      }
    }

    // --- Pagination state ---
    let currentPage = 1;
    const itemsPerPage = 18;
    let currentSearchType = null;
    let currentSearchParam = null;

async function searchByQuery(query, page = 1) {
      currentPage = page;
      currentSearchType = 'query';
      currentSearchParam = query;
      const skip = (page - 1) * itemsPerPage;
      
      const grid = document.getElementById('contactsGrid');
      grid.innerHTML = renderSkeleton({type: 'card', count: 6});
      
      try {
        const data = await searchContacts(query, null, skip, itemsPerPage);
        const contacts = data.contacts || data;
        const total = data.total || contacts.length;
        renderContacts(contacts);
        document.getElementById('resultsInfo').innerHTML = `<span class="font-semibold">"${query}"</span> <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-sm font-medium">${total}</span> <span class="text-gray-500">resultado${total !== 1 ? 's' : ''}</span>`;
        renderPagination('pagination', page, total, itemsPerPage, (p) => searchByQuery(query, p));
      } catch (err) {
        grid.innerHTML = renderEmptyState({
          emoji: '⚠️',
          title: 'Error en la búsqueda',
          subtitle: err.message,
          cta: { label: 'Reintentar', onClick: () => searchByQuery(query) }
        });
      }
    }

async function searchByCategory(categoryId, page = 1) {
      currentPage = page;
      currentSearchType = 'category';
      currentSearchParam = categoryId;
      const skip = (page - 1) * itemsPerPage;
      
      const grid = document.getElementById('contactsGrid');
      grid.innerHTML = renderSkeleton({type: 'card', count: 6});
      
      try {
        const data = await searchContacts(null, categoryId, skip, itemsPerPage);
        const contacts = data.contacts || data;
        const total = data.total || contacts.length;
        renderContacts(contacts);
        const categories = await getCategories();
        const cat = categories.find(c => c.id === parseInt(categoryId));
        document.getElementById('resultsInfo').innerHTML = cat ? `<span class="font-semibold">${cat.name}</span> <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-sm font-medium">${total}</span>` : `<span class="font-semibold">Resultados</span> <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-sm font-medium">${total}</span>`;
        renderPagination('pagination', page, total, itemsPerPage, (p) => searchByCategory(categoryId, p));
      } catch (err) {
        grid.innerHTML = renderEmptyState({
          emoji: '⚠️',
          title: 'Error en la búsqueda',
          subtitle: err.message,
          cta: { label: 'Reintentar', onClick: () => searchByCategory(categoryId) }
        });
      }
    }

    async function loadAllContacts(page = 1) {
      currentPage = page;
      currentSearchType = 'all';
      currentSearchParam = null;
        document.getElementById('resultsInfo').innerHTML = `<span class="font-semibold">Todos los contactos</span>`;
      const skip = (page - 1) * itemsPerPage;
      
      const grid = document.getElementById('contactsGrid');
      grid.innerHTML = renderSkeleton({type: 'card', count: 6});
      
      try {
        const data = await getContacts(skip, itemsPerPage);
        const contacts = data.contacts || data;
        const total = data.total || contacts.length;
        renderContacts(contacts);
        renderPagination('pagination', page, total, itemsPerPage, (p) => loadAllContacts(p));
      } catch (err) {
        grid.innerHTML = renderEmptyState({
          emoji: '⚠️',
          title: 'Error al cargar',
          subtitle: err.message,
          cta: { label: 'Reintentar', onClick: () => loadAllContacts() }
        });
      }
    }

    function renderSimplePagination(containerId, currentPage, hasNextPage, onPageChange) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (currentPage === 1 && !hasNextPage) {
        container.innerHTML = '';
        return;
      }

      window[`_pagination_${containerId}`] = (page) => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        onPageChange(page);
      };

      let html = '<div class="flex justify-center gap-3 mt-6 pt-4 border-t">';
      if (currentPage > 1) {
        html += `<button onclick="window._pagination_${containerId}(${currentPage - 1})" class="px-3 py-1 border rounded text-sm hover:bg-gray-100">← Anterior</button>`;
      }
      html += `<span class="px-3 py-1 text-sm font-medium">${currentPage}</span>`;
      if (hasNextPage) {
        html += `<button onclick="window._pagination_${containerId}(${currentPage + 1})" class="px-3 py-1 border rounded text-sm hover:bg-gray-100">Siguiente →</button>`;
      }
      html += '</div>';
      container.innerHTML = html;
    }

    async function renderContacts(contacts) {
      const grid = document.getElementById('contactsGrid');
      const noResults = document.getElementById('noResults');

      if (contacts.length === 0) {
        grid.classList.add('hidden');
        noResults.innerHTML = renderEmptyState({
          emoji: '🔍',
          title: 'Sin resultados',
          subtitle: 'No se encontraron contactos con esos criterios',
          cta: { label: 'Ver todas las categorías', onClick: () => window.location.href = '/search' }
        });
        noResults.classList.remove('hidden');
        return;
      }

      grid.classList.remove('hidden');
      noResults.classList.add('hidden');

      try {
        const categories = await getCategories();
        grid.innerHTML = contacts.map(c => {
          const cat = categories.find(cat => cat.id === c.category_id);
          const s = escapeHtml;
          
          // Use renderBadge component
          let badgeHtml = '';
          if (c.verification_level >= 3) {
            badgeHtml = renderBadge({text: '⭐ Premium', variant: 'success'});
          } else if (c.verification_level >= 2) {
            badgeHtml = renderBadge({text: '✓ Documentado', variant: 'success'});
          } else if (c.verification_level >= 1) {
            badgeHtml = renderBadge({text: '✓ Verificado', variant: 'info'});
          }
          
          return `
            <a href="/profile?id=${c.id}"
               class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
              <div class="flex items-center gap-2">
                <span class="font-semibold text-gray-800">${s(c.name)}</span>
                ${badgeHtml}
              </div>
              <div class="text-blue-600 mt-1">📞 ${s(c.phone)}</div>
              ${cat ? `<div class="text-sm text-gray-500 mt-1">${getCategoryEmoji(cat.code)} ${s(cat.name)}</div>` : ''}
              ${c.city ? `<div class="text-gray-500 text-sm mt-1">📍 ${s(c.city)}${c.neighborhood ? ' - ' + s(c.neighborhood) : ''}</div>` : ''}
              ${c.distance_km != null ? `<div class="text-green-600 text-sm mt-1">📏 ${c.distance_km} km</div>` : ''}
              ${c.description ? `<div class="text-gray-400 text-sm mt-2 line-clamp-2">${s(c.description)}</div>` : ''}
            </a>
          `;
        }).join('');
      } catch (err) {
        grid.innerHTML = contacts.map(c => {
          const s = escapeHtml;
          const verBadge = c.verification_level >= 3 ? '<span class="px-1.5 py-0.5 bg-yellow-100 text-yellow-700 text-xs rounded">⭐</span>' :
            c.verification_level >= 2 ? '<span class="px-1.5 py-0.5 bg-green-100 text-green-700 text-xs rounded">✓</span>' :
            c.verification_level >= 1 ? '<span class="px-1.5 py-0.5 bg-blue-100 text-blue-700 text-xs rounded">✓</span>' : '';
          return `
            <a href="/profile?id=${c.id}"
               class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
              <div class="flex items-center gap-2">
                <span class="font-semibold text-gray-800">${s(c.name)}</span>
                ${verBadge}
              </div>
              <div class="text-blue-600 mt-1">📞 ${s(c.phone)}</div>
              ${c.city ? `<div class="text-gray-500 text-sm mt-1">📍 ${s(c.city)}${c.neighborhood ? ' - ' + s(c.neighborhood) : ''}</div>` : ''}
              ${c.distance_km != null ? `<div class="text-green-600 text-sm mt-1">📏 ${c.distance_km} km</div>` : ''}
            </a>
          `;
        }).join('');
      }
    }

    function getCategoryEmoji(code) {
      const emojis = {
        100: '🔧', 101: '🔥', 102: '⚡', 103: '✂️', 104: '🧱',
        105: '🖌️', 106: '🪚', 107: '🛒', 108: '🥩', 109: '🥬',
        110: '🥖', 111: '👕', 112: '💊', 113: '📚', 114: '🍺',
        115: '🍽️', 116: '🎶', 117: '🎁', 118: '🐾', 119: '🔩',
