<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar - Agenda de la zona</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-8">
      <div class="flex gap-2 max-w-md">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar por nombre, ciudad o barrio..."
          class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
        <button
          onclick="doSearch()"
          class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
        >
          Buscar
        </button>
      </div>
    </div>

    <div id="resultsInfo" class="mb-4 text-gray-600"></div>
    <div id="contactDetail" class="hidden mb-8"></div>
    <div id="contactsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <div id="noResults" class="hidden text-center text-gray-500 py-10">
      No se encontraron resultados
    </div>
  </main>

  <script>
    function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        window.location.href = `/search?q=${encodeURIComponent(query)}`;
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    async function loadResults() {
      const params = new URLSearchParams(window.location.search);
      const query = params.get('q');
      const categoryId = params.get('category');
      const contactId = params.get('contact');

      if (contactId) {
        await loadContactDetail(contactId);
        return;
      }

      if (query) {
        document.getElementById('searchInput').value = query;
        await searchByQuery(query);
        return;
      }

      if (categoryId) {
        await searchByCategory(categoryId);
        return;
      }

      await loadAllContacts();
    }

    async function loadContactDetail(id) {
      try {
        const contact = await getContact(id);
        const categories = await getCategories();
        const category = categories.find(c => c.id === contact.category_id);
        const grid = document.getElementById('contactsGrid');
        grid.classList.add('hidden');

        // Escape all user data to prevent XSS
        const safeName = escapeHtml(contact.name);
        const safePhone = escapeHtml(contact.phone);
        const safeEmail = escapeHtml(contact.email);
        const safeSchedule = escapeHtml(contact.schedule);
        const safeAddress = escapeHtml(contact.address);
        const safeCity = escapeHtml(contact.city);
        const safeNeighborhood = escapeHtml(contact.neighborhood);
        const safeDescription = escapeHtml(contact.description);
        const safeWebsite = escapeHtml(contact.website);
        const safeMapsUrl = escapeHtml(contact.maps_url);
        const safePhotoPath = escapeHtml(contact.photo_path);
        const safeCategoryName = category ? escapeHtml(category.name) : '';

        document.getElementById('contactDetail').classList.remove('hidden');
        document.getElementById('contactDetail').innerHTML = `
          <div class="bg-white rounded-lg shadow-sm border p-6 max-w-lg">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h2 class="text-2xl font-bold text-gray-800">${safeName}</h2>
                ${category ? `<div class="text-sm text-blue-600 mt-1">${getCategoryEmoji(category.code)} ${safeCategoryName}</div>` : ''}
              </div>
              ${contact.is_verified ? '<span class="px-2 py-1 bg-green-100 text-green-700 text-sm rounded">✓ Verificado</span>' : ''}
            </div>
            ${safePhotoPath ? `<img src="${safePhotoPath}" alt="${safeName}" class="w-full h-48 object-cover rounded-lg mb-4">` : ''}
            <div class="space-y-3">
              <div class="flex items-center gap-3">
                <span class="text-gray-500">📞</span>
                <a href="tel:${safePhone}" class="text-blue-600 hover:underline">${safePhone}</a>
              </div>
              ${safeEmail ? `<div class="flex items-center gap-3"><span class="text-gray-500">✉️</span><a href="mailto:${safeEmail}" class="text-blue-600 hover:underline">${safeEmail}</a></div>` : ''}
              ${safeSchedule ? `<div class="flex items-center gap-3"><span class="text-gray-500">🕐</span><span>${safeSchedule}</span></div>` : ''}
              ${safeAddress ? `<div class="flex items-center gap-3"><span class="text-gray-500">📍</span><span>${safeAddress}</span></div>` : ''}
              ${safeCity ? `<div class="flex items-center gap-3"><span class="text-gray-500">🏙️</span><span>${safeCity}${safeNeighborhood ? ' - ' + safeNeighborhood : ''}</span></div>` : ''}
              ${safeWebsite ? `<div class="flex items-center gap-3"><span class="text-gray-500">🌐</span><a href="${safeWebsite}" target="_blank" class="text-blue-600 hover:underline">${safeWebsite}</a></div>` : ''}
              ${safeMapsUrl ? `<div class="flex items-center gap-3"><span class="text-gray-500">🗺️</span><a href="${safeMapsUrl}" target="_blank" class="text-blue-600 hover:underline">Ver en Google Maps</a></div>` : ''}
              ${safeDescription ? `<div class="flex items-start gap-3"><span class="text-gray-500">📝</span><span>${safeDescription}</span></div>` : ''}
            </div>
            <div class="flex gap-4 mt-6">
              <a href="/search" class="text-blue-600 hover:underline">← Volver a la búsqueda</a>
              <a href="/edit?id=${contact.id}" class="text-blue-600 hover:underline">✏️ Editar</a>
              ${isLoggedIn() ? `<a href="/history?id=${contact.id}" class="text-gray-600 hover:underline">Ver historial</a>` : ''}
              ${contact.pending_changes_count > 0 && isLoggedIn() ? `<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-sm">${contact.pending_changes_count} pendiente${contact.pending_changes_count > 1 ? 's' : ''}</span>` : ''}
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          `<div class="text-red-500 col-span-full">Error: ${err.message}</div>`;
      }
    }

    async function searchByQuery(query) {
      document.getElementById('resultsInfo').textContent = `Resultados para "${query}"`;
      try {
        const contacts = await searchContacts(query);
        renderContacts(contacts);
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          `<div class="text-red-500 col-span-full">Error: ${err.message}</div>`;
      }
    }

    async function searchByCategory(categoryId) {
      try {
        const categories = await getCategories();
        const category = categories.find(c => c.id === parseInt(categoryId));
        if (category) {
          document.getElementById('resultsInfo').textContent = `${getCategoryEmoji(category.code)} ${category.name}`;
        }
        const contacts = await searchContacts('', parseInt(categoryId));
        renderContacts(contacts);
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          `<div class="text-red-500 col-span-full">Error: ${escapeHtml(err.message)}</div>`;
      }
    }

    async function loadAllContacts() {
      document.getElementById('resultsInfo').textContent = 'Todos los contactos';
      try {
        const contacts = await getContacts();
        renderContacts(contacts);
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          `<div class="text-red-500 col-span-full">Error: ${err.message}</div>`;
      }
    }

    async function renderContacts(contacts) {
      const grid = document.getElementById('contactsGrid');
      const noResults = document.getElementById('noResults');

      if (contacts.length === 0) {
        grid.classList.add('hidden');
        noResults.classList.remove('hidden');
        return;
      }

      try {
        const categories = await getCategories();
        grid.innerHTML = contacts.map(c => {
          const cat = categories.find(cat => cat.id === c.category_id);
          const safeName = escapeHtml(c.name);
          const safePhone = escapeHtml(c.phone);
          const safeCity = escapeHtml(c.city);
          const safeNeighborhood = escapeHtml(c.neighborhood);
          const safeDescription = escapeHtml(c.description);
          const safeCategoryName = cat ? escapeHtml(cat.name) : '';
          return `
            <a href="/search?contact=${c.id}"
               class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
              <div class="font-semibold text-gray-800">${safeName}</div>
              <div class="text-blue-600 mt-1">📞 ${safePhone}</div>
              ${cat ? `<div class="text-sm text-gray-500 mt-1">${getCategoryEmoji(cat.code)} ${safeCategoryName}</div>` : ''}
              ${safeCity ? `<div class="text-gray-500 text-sm mt-1">📍 ${safeCity}${safeNeighborhood ? ' - ' + safeNeighborhood : ''}</div>` : ''}
              ${safeDescription ? `<div class="text-gray-400 text-sm mt-2 line-clamp-2">${safeDescription}</div>` : ''}
            </a>
          `;
        }).join('');
      } catch (err) {
        grid.innerHTML = contacts.map(c => {
          const safeName = escapeHtml(c.name);
          const safePhone = escapeHtml(c.phone);
          const safeCity = escapeHtml(c.city);
          const safeNeighborhood = escapeHtml(c.neighborhood);
          return `
            <a href="/search?contact=${c.id}"
               class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
              <div class="font-semibold text-gray-800">${safeName}</div>
              <div class="text-blue-600 mt-1">📞 ${safePhone}</div>
              ${safeCity ? `<div class="text-gray-500 text-sm mt-1">📍 ${safeCity}${safeNeighborhood ? ' - ' + safeNeighborhood : ''}</div>` : ''}
            </a>
          `;
        }).join('');
      }
    }

    function getCategoryEmoji(code) {
      const emojis = {
        100: '🔧', 101: '🔥', 102: '⚡', 103: '✂️', 104: '🧱',
        105: '🖌️', 106: '🪚', 107: '🛒', 108: '🥩', 109: '🥬',
        110: '🥖', 111: '👕', 112: '💊', 113: '📚', 114: '🍺',
        115: '🍽️', 116: '🎶', 117: '🎁', 118: '🐾', 119: '🔩',
        120: '🏪', 121: '🧸', 122: '📦', 123: '❤️', 124: '🏠',
        999: '📌'
      };
      return emojis[code] || '📌';
    }

    loadResults();
  </script>
</body>
</html>
