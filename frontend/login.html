<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Agenda de la zona</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-md mx-auto px-4 py-12">
    <div id="breadcrumbs"></div>
    <div class="bg-white rounded-lg shadow-sm border p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Iniciar Sesión</h1>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email o Usuario</label>
          <input type="text" id="usernameOrEmail" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="tu@email.com o usuario">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input type="password" id="password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Tu contraseña">
        </div>

        <div id="errorMsg" class="hidden text-red-600 text-sm text-center"></div>

        <button type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Iniciar Sesión
        </button>
      </form>

      <div class="mt-6 text-center text-gray-600">
        ¿No tenés cuenta? <a href="/register" class="text-blue-600 hover:underline">Registrate</a>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isLoggedIn()) {
        window.location.href = '/';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const usernameOrEmail = document.getElementById('usernameOrEmail').value.trim();
      const password = document.getElementById('password').value;

      try {
        await login(usernameOrEmail, password);
        window.location.href = '/';
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        document.getElementById('errorMsg').classList.remove('hidden');
      }
    });
  </script>
    <script>
      document.getElementById('breadcrumbs').innerHTML = renderBreadcrumbs([{'label': 'Inicio', 'url': '/'}, {'label': 'Iniciar sesión', 'url': null}]);
    </script>
  </body>
</html>
