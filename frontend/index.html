<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Comunitaria</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-[var(--text-main)] min-h-screen transition-colors duration-300">
  <nav class="glass-bg sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="text-2xl font-black text-primary-hsl tracking-tight">📋 Agenda<span class="font-light">Zonal</span></a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="text-center mb-10">
      <p class="text-gray-600 text-base">Buscá servicios y comercios en tu comunidad</p>
      <div class="mt-6 max-w-md mx-auto">
        <div class="flex gap-2">
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar por nombre, teléfono o ciudad..."
            class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
          <button
            onclick="doSearch()"
            class="primary-btn shadow-lg shadow-blue-500/20 px-8 flex items-center gap-2"
          >
            🔍 Buscar
          </button>
        </div>
      </div>
    </div>


    <div id="categoriesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
      ${renderSkeleton({type: 'card', count: 12})}
    </div>

    <!-- Sección de Últimos registros temporalmente oculta -->
    <!--
    <div class="mt-10">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Últimos registros</h2>
      <div id="contactsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-center text-gray-500 col-span-full">Cargando contactos...</div>
      </div>
    </div>
    -->

    <div class="mt-10">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold text-gray-800">🏥 Teléfonos útiles</h2>
        <a href="/admin/utilities" class="text-blue-600 hover:underline text-sm">Ver todas →</a>
      </div>
      <div id="utilitiesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        ${renderSkeleton({type: 'list', count: 3})}
      </div>
    </div>
  </main>

  <footer class="bg-white border-t mt-12 py-6">
    <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
      Agenda de la zona © 2026
    </div>
  </footer>

  <script>
    function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        window.location.href = `/search?q=${encodeURIComponent(query)}`;
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    async function loadCategories() {
      try {
        const categories = await getCategories();
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = categories.map(cat => `
          <a href="/search?category=${cat.id}"
             class="bg-[var(--surface-card)] rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-5 text-center hover:shadow-md hover:border-primary-hsl dark:hover:border-primary-hsl/50 transition-all hover:scale-105 cursor-pointer">
            <div class="text-3xl mb-3">${getCategoryEmoji(cat.code)}</div>
            <div class="text-sm font-bold text-gray-700 dark:text-gray-200">${cat.name}</div>
          </a>
        `).join('');
      } catch (err) {
        document.getElementById('categoriesGrid').innerHTML = 
          renderEmptyState({
            emoji: '⚠️',
            title: 'Error al cargar',
            subtitle: 'No se pudieron cargar las categorías',
            cta: { label: 'Reintentar', onClick: () => loadCategories() }
          });
      }
    }

    async function loadRecentContacts() {
      try {
        const contacts = await getContacts();
        const grid = document.getElementById('contactsGrid');
        if (contacts.length === 0) {
          grid.innerHTML = '<div class="text-center text-blue-500 col-span-full py-8">📭 No hay contactos registrados todavía.<br><span class="text-gray-500 text-sm">¡Sé el primero en agregar uno!</span></div>';
          return;
        }
        grid.innerHTML = contacts.slice(0, 6).map(c => `
          <a href="/profile?id=${c.id}"
             class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
            <div class="font-semibold text-gray-800">${c.name}</div>
            <div class="text-blue-600 mt-1">${c.phone}</div>
            ${c.city ? `<div class="text-gray-500 text-sm mt-1">${c.city}${c.neighborhood ? ' - ' + c.neighborhood : ''}</div>` : ''}
          </a>
        `).join('');
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          '<div class="text-center text-amber-600 col-span-full py-8">⚠️ No se pudieron cargar los contactos.<br><span class="text-gray-500 text-sm">Intentalo más tarde.</span></div>';
      }
    }

    function getCategoryEmoji(code) {
      const emojis = {
        100: '🔧', 101: '🔥', 102: '⚡', 103: '✂️', 104: '🧱',
        105: '🖌️', 106: '🪚', 107: '🛒', 108: '🥩', 109: '🥬',
        110: '🥖', 111: '👕', 112: '💊', 113: '📚', 114: '🍺',
        115: '🍽️', 116: '🎶', 117: '🎁', 118: '🐾', 119: '🔩',
        120: '🏪', 121: '🧸', 122: '📦', 123: '❤️', 124: '🏠',
        125: '🏛️', 126: '🎓', 127: '✒️', 128: '🚚', 129: '🖨️',
        130: '🍷', 131: '🍦', 132: '🏥', 133: '🔧', 134: '🚗', 999: '📌'
      };
      return emojis[code] || '📌';
    }

    async function loadUtilities() {
      const grid = document.getElementById('utilitiesGrid');
      try {
        const data = await apiRequest('/api/utilities');
        if (!data || data.length === 0) {
          grid.innerHTML = renderEmptyState({
            emoji: '📋',
            title: 'Sin utilidades',
            subtitle: 'No hay teléfonos útiles registrados'
          });
          return;
        }
        const typeLabels = { farmacia_turno: '💊', emergencia: '🚨', otro: '📋' };
        
        // Sort: Priority items first
        const sortedData = [...data].sort((a, b) => (b.is_priority === a.is_priority) ? 0 : b.is_priority ? 1 : -1);

        grid.innerHTML = sortedData.slice(0, 6).map(u => {
          const isPriority = !!u.is_priority;
          const priorityClasses = isPriority 
            ? 'ring-2 ring-danger-vibrant bg-red-50 dark:bg-red-900/10 border-red-200 dark:border-red-900/30' 
            : 'bg-[var(--surface-card)] border-gray-100 dark:border-gray-800';
          const badgeHtml = isPriority 
            ? `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-black bg-danger-vibrant text-white shadow-sm shadow-red-500/30 animate-pulse">ALERTA</span>` 
            : '';
            
          return `
            <div class="rounded-2xl shadow-sm border p-5 transition-all duration-300 hover:shadow-md ${priorityClasses}">
              <div class="flex items-start justify-between">
                <div class="font-bold text-gray-800 dark:text-gray-100 text-lg">${typeLabels[u.type] || '📋'} ${escapeHtml(u.name)} ${badgeHtml}</div>
              </div>
              ${u.phone ? `<div class="text-primary-hsl mt-2 font-black text-xl tracking-tight"><a href="tel:${escapeHtml(u.phone)}">📞 ${escapeHtml(u.phone)}</a></div>` : ''}
              ${u.address ? `<div class="text-gray-500 dark:text-gray-400 text-sm mt-2 flex items-center gap-1.5"><span>📍</span> ${escapeHtml(u.address)}</div>` : ''}
              ${u.schedule ? `<div class="text-gray-600 dark:text-gray-300 text-sm mt-1.5 flex items-center gap-1.5 font-medium"><span>🕐</span> ${escapeHtml(u.schedule)}</div>` : ''}
              ${u.city && isPriority ? `<div class="text-danger-vibrant text-[10px] font-black uppercase mt-3 tracking-widest">Zona: ${escapeHtml(u.city)}</div>` : ''}
            </div>
          `;
        }).join('');
      } catch (err) {
        grid.innerHTML = '<div class="text-gray-500 col-span-full">Utilidades no disponibles</div>';
      }
    }

    loadCategories();
    // loadRecentContacts(); // Deshabilitado temporalmente
    loadUtilities();
  </script>
</body>
</html>
