<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Comunitaria</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="text-center mb-10">
      <p class="text-gray-600 text-base">Buscá servicios y comercios en tu comunidad</p>
      <div class="mt-6 max-w-md mx-auto">
        <div class="flex gap-2">
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar por nombre, teléfono o ciudad..."
            class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
          <button
            onclick="doSearch()"
            class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
          >
            Buscar
          </button>
        </div>
      </div>
    </div>


    <div id="categoriesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
      <div class="text-center text-gray-500 col-span-full">Cargando categorías...</div>
    </div>

    <!-- Sección de Últimos registros temporalmente oculta -->
    <!--
    <div class="mt-10">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">Últimos registros</h2>
      <div id="contactsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-center text-gray-500 col-span-full">Cargando contactos...</div>
      </div>
    </div>
    -->

    <div class="mt-10">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold text-gray-800">🏥 Teléfonos útiles</h2>
        <a href="/admin/utilities" class="text-blue-600 hover:underline text-sm">Ver todas →</a>
      </div>
      <div id="utilitiesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-center text-gray-500 col-span-full">Cargando utilidades...</div>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t mt-12 py-6">
    <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
      Agenda de la zona © 2026
    </div>
  </footer>

  <script>
    function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        window.location.href = `/search?q=${encodeURIComponent(query)}`;
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    async function loadCategories() {
      try {
        const categories = await getCategories();
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = categories.map(cat => `
          <a href="/search?category=${cat.id}"
             class="bg-white rounded-lg shadow-sm border p-4 text-center hover:shadow-md hover:border-blue-300 transition cursor-pointer">
            <div class="text-2xl mb-2">${getCategoryEmoji(cat.code)}</div>
            <div class="text-sm font-medium text-gray-700">${cat.name}</div>
          </a>
        `).join('');
      } catch (err) {
        document.getElementById('categoriesGrid').innerHTML =
          '<div class="text-red-500 col-span-full">Error al cargar categorías</div>';
      }
    }

    async function loadRecentContacts() {
      try {
        const contacts = await getContacts();
        const grid = document.getElementById('contactsGrid');
        if (contacts.length === 0) {
          grid.innerHTML = '<div class="text-center text-blue-500 col-span-full py-8">📭 No hay contactos registrados todavía.<br><span class="text-gray-500 text-sm">¡Sé el primero en agregar uno!</span></div>';
          return;
        }
        grid.innerHTML = contacts.slice(0, 6).map(c => `
          <a href="/profile?id=${c.id}"
             class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
            <div class="font-semibold text-gray-800">${c.name}</div>
            <div class="text-blue-600 mt-1">${c.phone}</div>
            ${c.city ? `<div class="text-gray-500 text-sm mt-1">${c.city}${c.neighborhood ? ' - ' + c.neighborhood : ''}</div>` : ''}
          </a>
        `).join('');
      } catch (err) {
        document.getElementById('contactsGrid').innerHTML =
          '<div class="text-center text-amber-600 col-span-full py-8">⚠️ No se pudieron cargar los contactos.<br><span class="text-gray-500 text-sm">Intentalo más tarde.</span></div>';
      }
    }

    function getCategoryEmoji(code) {
      const emojis = {
        100: '🔧', 101: '🔥', 102: '⚡', 103: '✂️', 104: '🧱',
        105: '🖌️', 106: '🪚', 107: '🛒', 108: '🥩', 109: '🥬',
        110: '🥖', 111: '👕', 112: '💊', 113: '📚', 114: '🍺',
        115: '🍽️', 116: '🎶', 117: '🎁', 118: '🐾', 119: '🔩',
        120: '🏪', 121: '🧸', 122: '📦', 123: '❤️', 124: '🏠',
        999: '📌'
      };
      return emojis[code] || '📌';
    }

    async function loadUtilities() {
      const grid = document.getElementById('utilitiesGrid');
      try {
        const data = await apiRequest('/api/utilities');
        if (!data || data.length === 0) {
          grid.innerHTML = '<div class="text-gray-500 col-span-full">No hay utilidades registradas</div>';
          return;
        }
        const typeLabels = { farmacia_turno: '💊', emergencia: '🚨', otro: '📋' };
        grid.innerHTML = data.slice(0, 6).map(u => `
          <div class="bg-white rounded-lg shadow-sm border p-4">
            <div class="font-semibold text-gray-800">${typeLabels[u.type] || '📋'} ${escapeHtml(u.name)}</div>
            ${u.phone ? `<div class="text-blue-600 mt-1"><a href="tel:${escapeHtml(u.phone)}">📞 ${escapeHtml(u.phone)}</a></div>` : ''}
            ${u.address ? `<div class="text-gray-500 text-sm mt-1">📍 ${escapeHtml(u.address)}</div>` : ''}
            ${u.schedule ? `<div class="text-gray-500 text-sm mt-1">🕐 ${escapeHtml(u.schedule)}</div>` : ''}
          </div>
        `).join('');
      } catch (err) {
        grid.innerHTML = '<div class="text-gray-500 col-span-full">Utilidades no disponibles</div>';
      }
    }

    loadCategories();
    // loadRecentContacts(); // Deshabilitado temporalmente
    loadUtilities();
  </script>
</body>
</html>
