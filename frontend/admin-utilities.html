<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilidades - Admin - Agenda de la zona</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">🏥 Utilidades del Barrio</h1>
    <div id="utilitiesContainer"><div class="text-center py-10 text-gray-500">Cargando...</div></div>
  </main>
  <script>
    async function loadUtilities() {
      const container = document.getElementById('utilitiesContainer');
      try {
        const data = await apiRequest('/api/utilities');
        if (data.length === 0) { container.innerHTML = '<div class="bg-white rounded-lg shadow-sm border p-8 text-center"><div class="text-4xl mb-4">📋</div><p class="text-gray-600">No hay utilidades registradas</p></div>'; return; }
        const types = [...new Set(data.map(u => u.type))];
        const typeLabels = { farmacia_turno: '💊 Farmacias de turno', emergencia: '🚨 Emergencias', otro: '📋 Otros' };
        container.innerHTML = `<div class="space-y-6">${types.map(type => {
          const items = data.filter(u => u.type === type);
          return `<div><h2 class="text-lg font-semibold text-gray-800 mb-3">${typeLabels[type] || type}</h2><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${items.map(u => {
            const s = (v) => escapeHtml(v || '');
            return `<div class="bg-white rounded-lg shadow-sm border p-4"><div class="font-semibold text-gray-800">${s(u.name)}</div>${u.phone ? `<div class="text-blue-600 mt-1"><a href="tel:${s(u.phone)}">📞 ${s(u.phone)}</a></div>` : ''}${u.address ? `<div class="text-gray-500 text-sm mt-1">📍 ${s(u.address)}</div>` : ''}${u.schedule ? `<div class="text-gray-500 text-sm mt-1">🕐 ${s(u.schedule)}</div>` : ''}</div>`;
          }).join('')}</div></div>`;
        }).join('')}</div>`;
      } catch (err) { container.innerHTML = `<div class="text-red-500 text-center py-10">Error: ${escapeHtml(err.message)}</div>`; }
    }
    loadUtilities();
  </script>
</body>
</html>
