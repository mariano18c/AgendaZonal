<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial - Agenda de la zona</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="mb-6">
      <a href="/search" class="text-blue-600 hover:underline">← Volver a la búsqueda</a>
    </div>

    <div id="loginRequired" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center mb-6">
      <p class="text-yellow-800 mb-4">Necesitás iniciar sesión para ver el historial de cambios</p>
      <a href="/login" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Iniciar sesión</a>
    </div>

    <div id="content" class="hidden">
      <div id="contactInfo" class="bg-white rounded-lg shadow-sm border p-6 mb-6"></div>

      <h2 class="text-xl font-semibold text-gray-800 mb-4">Historial de cambios</h2>
      <div id="historyList" class="space-y-4"></div>
      <div id="pagination" class="mt-4"></div>
      <div id="noHistory" class="hidden text-center text-gray-500 py-10">
        No hay cambios registrados
      </div>
    </div>
  </main>

  <script>
    const FIELD_LABELS = {
      name: 'Nombre',
      phone: 'Teléfono',
      email: 'Email',
      address: 'Dirección',
      city: 'Ciudad',
      neighborhood: 'Barrio',
      category_id: 'Categoría',
      description: 'Descripción',
      schedule: 'Horario',
      website: 'Sitio web',
      photo_path: 'Imagen',
      latitude: 'Latitud',
      longitude: 'Longitud',
      maps_url: 'Google Maps',
    };

    let currentPage = 1;
    const itemsPerPage = 20;
    let currentContactId = null;

    async function loadHistory(page = 1) {
      currentPage = page;
      // Check if logged in
      if (!isLoggedIn()) {
        document.getElementById('loginRequired').classList.remove('hidden');
        return;
      }

      document.getElementById('content').classList.remove('hidden');

      const params = new URLSearchParams(window.location.search);
      currentContactId = params.get('id');

      if (!currentContactId) {
        document.getElementById('contactInfo').innerHTML = '<p class="text-red-500">No se especificó un contacto</p>';
        return;
      }

      const skip = (page - 1) * itemsPerPage;

      try {
        const contact = await getContact(currentContactId);
        renderContactInfo(contact);

        const data = await getContactHistory(currentContactId, skip, itemsPerPage);
        renderHistory(data.history);
        renderPagination('pagination', page, data.total, itemsPerPage, (p) => loadHistory(p));
      } catch (err) {
        document.getElementById('contactInfo').innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
      }
    }

    function renderContactInfo(contact) {
      const div = document.getElementById('contactInfo');
      const safeName = escapeHtml(contact.name);
      const safePhone = escapeHtml(contact.phone);
      const user = getUser();
      const isAdmin = user && (user.role === 'admin' || user.role === 'moderator');

      const levelLabels = ['Sin verificar', 'Verificado', 'Documentado', 'Premium'];
      const levelColors = ['bg-gray-100 text-gray-600', 'bg-blue-100 text-blue-700', 'bg-green-100 text-green-700', 'bg-yellow-100 text-yellow-700'];
      const levelEmojis = ['', '✓', '✓', '⭐'];
      const currentLevel = contact.verification_level || 0;

      let verBadge = '';
      if (currentLevel >= 1) {
        verBadge = `<span class="inline-block mt-2 px-2 py-1 ${levelColors[currentLevel]} text-sm rounded">${levelEmojis[currentLevel]} ${levelLabels[currentLevel]}</span>`;
      }

      let levelSelector = '';
      if (isAdmin) {
        levelSelector = `
          <div class="mt-3">
            <label class="text-sm text-gray-600 mr-2">Nivel de verificación:</label>
            <select onchange="handleChangeLevel(${contact.id}, this.value)" class="px-2 py-1 border border-gray-300 rounded text-sm">
              <option value="0" ${currentLevel === 0 ? 'selected' : ''}>Sin verificar</option>
              <option value="1" ${currentLevel === 1 ? 'selected' : ''}>✓ Verificado</option>
              <option value="2" ${currentLevel === 2 ? 'selected' : ''}>✓ Documentado</option>
              <option value="3" ${currentLevel === 3 ? 'selected' : ''}>⭐ Premium</option>
            </select>
          </div>
        `;
      }

      div.innerHTML = `
        <div class="flex items-start justify-between">
          <div>
            <h2 class="text-2xl font-bold text-gray-800">${safeName}</h2>
            <p class="text-blue-600 mt-1">${safePhone}</p>
            ${verBadge}
            ${levelSelector}
          </div>
        </div>
      `;
    }

    async function handleChangeLevel(contactId, level) {
      try {
        await setVerificationLevel(contactId, parseInt(level));
        const levelLabels = ['Sin verificar', 'Verificado', 'Documentado', 'Premium'];
        showAlert(`Nivel actualizado a: ${levelLabels[level]}`, 'success');
        // Reload contact info
        const contact = await getContact(contactId);
        renderContactInfo(contact);
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    function renderHistory(history) {
      const list = document.getElementById('historyList');
      const noHistory = document.getElementById('noHistory');

      if (history.length === 0) {
        list.classList.add('hidden');
        noHistory.classList.remove('hidden');
        return;
      }

      list.innerHTML = history.map(h => {
        const fieldLabel = FIELD_LABELS[h.field_name] || h.field_name;
        const date = new Date(h.changed_at).toLocaleString('es-AR');
        const safeOld = escapeHtml(h.old_value) || '(vacio)';
        const safeNew = escapeHtml(h.new_value) || '(vacio)';

        return `
          <div class="bg-white rounded-lg shadow-sm border p-4">
            <div class="flex justify-between items-start mb-2">
              <span class="font-medium text-gray-800">${fieldLabel}</span>
              <span class="text-sm text-gray-500">${date}</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <p class="text-xs text-gray-500 mb-1">Valor anterior</p>
                <p class="text-red-600 line-through">${safeOld}</p>
              </div>
              <div>
                <p class="text-xs text-gray-500 mb-1">Valor nuevo</p>
                <p class="text-green-600 font-medium">${safeNew}</p>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function showAlert(message, type = 'success') {
      alert(message);
    }

    async function handleVerify(contactId, verify) {
      try {
        await verifyContact(contactId, verify);
        showAlert(verify ? 'Contacto verificado' : 'Verificación removida', 'success');
        loadHistory();
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }

    loadHistory();
  </script>
</body>
</html>
