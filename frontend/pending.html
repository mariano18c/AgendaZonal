<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambios Pendientes - Agenda de la zona</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-blue-600">📋 Agenda de la zona</a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="mb-6">
      <a href="/" class="text-blue-600 hover:underline">← Volver al inicio</a>
    </div>

    <h1 class="text-2xl font-bold text-gray-800 mb-2">Cambios Pendientes</h1>
    <p class="text-gray-600 mb-6">Contactos con cambios sugeridos pendientes de verificación</p>

    <div id="loginRequired" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
      <p class="text-yellow-800 mb-4">Necesitás iniciar sesión para ver los cambios pendientes</p>
      <a href="/login" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Iniciar sesión</a>
    </div>

    <div id="content" class="hidden">
      <div id="loadingMsg" class="text-center text-gray-500 py-10">Cargando contactos...</div>
      
      <div id="contactsList" class="space-y-4"></div>
      
      <div id="noPending" class="hidden text-center text-gray-500 py-10">
        No hay cambios pendientes
      </div>
    </div>
  </main>

  <script>
    async function loadPendingContacts() {
      if (!isLoggedIn()) {
        document.getElementById('loginRequired').classList.remove('hidden');
        return;
      }

      document.getElementById('content').classList.remove('hidden');

      try {
        const contacts = await getPendingContacts();
        document.getElementById('loadingMsg').classList.add('hidden');

        if (contacts.length === 0) {
          document.getElementById('noPending').classList.remove('hidden');
          return;
        }

        renderContacts(contacts);
      } catch (err) {
        document.getElementById('loadingMsg').innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
      }
    }

    function renderContacts(contacts) {
      const list = document.getElementById('contactsList');
      list.innerHTML = contacts.map(c => {
        const safeName = escapeHtml(c.name);
        const safePhone = escapeHtml(c.phone);
        const safeCity = escapeHtml(c.city);
        return `
        <a href="/pending/changes?id=${c.id}"
           class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition block">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-semibold text-gray-800">${safeName}</h3>
              <p class="text-blue-600 text-sm">${safePhone}</p>
              ${safeCity ? `<p class="text-gray-500 text-sm">${safeCity}</p>` : ''}
            </div>
            <span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-sm font-medium">
              ${c.pending_changes_count} pendiente${c.pending_changes_count > 1 ? 's' : ''}
            </span>
          </div>
        </a>
      `;}).join('');
    }

    loadPendingContacts();
  </script>
</body>
</html>
