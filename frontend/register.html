<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Agenda de la zona</title>
  <link rel="stylesheet" href="/css/output.css">
  <link rel="manifest" href="/manifest.json">
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-[var(--text-main)] min-h-screen transition-colors duration-300">
  <nav class="glass-bg sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="text-2xl font-black text-primary-hsl tracking-tight">📋 Agenda<span class="font-light">Zonal</span></a>
      <div id="navbar"></div>
    </div>
  </nav>

  <main class="max-w-md mx-auto px-4 py-12">
    <div id="breadcrumbs"></div>
    <div class="bg-white rounded-lg shadow-sm border p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Crear Cuenta</h1>

      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de usuario *</label>
          <input type="text" id="username" required minlength="3" maxlength="50"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="usuario123">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input type="email" id="email" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="tu@email.com">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Código área *</label>
            <input type="text" id="phoneAreaCode" required minlength="2" maxlength="5"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="11">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono *</label>
            <input type="text" id="phoneNumber" required minlength="6" maxlength="15"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="12345678">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña *</label>
          <input type="password" id="password" required minlength="8"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Mínimo 8 caracteres">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar contraseña *</label>
          <input type="password" id="confirmPassword" required minlength="8"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Repetí tu contraseña">
        </div>

        <div id="captchaSection" class="border border-gray-200 rounded-lg p-4 bg-gray-50">
          <label class="block text-sm font-medium text-gray-700 mb-1">Verificación *</label>
          <div class="flex gap-2 items-center mb-3">
            <span id="captchaQuestion" class="text-lg font-semibold text-gray-800">Cargando...</span>
            <button type="button" id="captchaRefresh" class="text-blue-600 hover:text-blue-800 transition" title="Obtener nuevo desafío">🔄</button>
          </div>
          <input type="number" id="captchaAnswer" required inputmode="numeric"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Tu respuesta">
          <input type="hidden" id="captchaChallengeId">
          <div id="captchaError" class="hidden text-red-600 text-sm mt-2"></div>
        </div>

        <div id="errorMsg" class="hidden text-red-600 text-sm text-center"></div>

        <button type="submit"
          class="primary-btn w-full shadow-lg shadow-blue-500/20 py-4 text-lg font-bold">
          Registrarse
        </button>
      </form>

      <div id="pendingMessage" class="hidden text-center">
        <div class="mb-4">
          <svg class="mx-auto h-16 w-16 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <p id="pendingText" class="text-gray-600 mb-6 text-lg"></p>
        <a href="/login" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Ir al login
        </a>
      </div>

      <div class="mt-6 text-center text-gray-600">
        ¿Ya tenés cuenta? <a href="/login" class="text-blue-600 hover:underline">Iniciá sesión</a>
      </div>
    </div>
  </main>

  <script>
    let currentCaptchaId = null;

    async function loadCaptcha() {
      try {
        const result = await getCaptcha();
        currentCaptchaId = result.challenge_id;
        document.getElementById('captchaQuestion').textContent = result.question;
        document.getElementById('captchaChallengeId').value = result.challenge_id;
        document.getElementById('captchaError').classList.add('hidden');
      } catch (err) {
        document.getElementById('captchaQuestion').textContent = 'Error al cargar verificación';
        document.getElementById('captchaError').textContent = 'No se pudo cargar el desafío. Hacé clic en 🔄 para reintentar.';
        document.getElementById('captchaError').classList.remove('hidden');
      }
    }

    async function refreshCaptcha() {
      document.getElementById('captchaAnswer').value = '';
      document.getElementById('captchaError').classList.add('hidden');
      await loadCaptcha();
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (isLoggedIn()) {
        window.location.href = '/';
      }
      loadCaptcha();
      document.getElementById('captchaRefresh').addEventListener('click', refreshCaptcha);
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        document.getElementById('errorMsg').textContent = 'Las contraseñas no coinciden';
        document.getElementById('errorMsg').classList.remove('hidden');
        return;
      }

      const captchaAnswer = document.getElementById('captchaAnswer').value;
      if (!captchaAnswer || captchaAnswer.trim() === '') {
        document.getElementById('captchaError').textContent = 'Respondé la verificación para continuar.';
        document.getElementById('captchaError').classList.remove('hidden');
        return;
      }

      const data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone_area_code: document.getElementById('phoneAreaCode').value.trim(),
        phone_number: document.getElementById('phoneNumber').value.trim(),
        password: password,
        captcha_challenge_id: currentCaptchaId,
        captcha_answer: captchaAnswer.trim(),
      };

      try {
        const result = await register(data);
        // Show pending approval message instead of redirecting
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('pendingText').textContent = result.message || 'Tu cuenta está pendiente de aprobación por un administrador. Podrás iniciar sesión cuando sea activada.';
        document.getElementById('pendingMessage').classList.remove('hidden');
      } catch (err) {
        const msg = err.message;
        if (msg.includes('CAPTCHA') || msg.includes('expirado') || msg.includes('Desafío')) {
          document.getElementById('captchaError').textContent = msg;
          document.getElementById('captchaError').classList.remove('hidden');
          document.getElementById('captchaAnswer').value = '';
          // Load new captcha WITHOUT hiding the error message
          try {
            const result = await getCaptcha();
            currentCaptchaId = result.challenge_id;
            document.getElementById('captchaQuestion').textContent = result.question;
            document.getElementById('captchaChallengeId').value = result.challenge_id;
          } catch (e) {
            document.getElementById('captchaQuestion').textContent = 'Error al cargar verificación';
          }
        } else {
          document.getElementById('errorMsg').textContent = msg;
          document.getElementById('errorMsg').classList.remove('hidden');
        }
      }
    });
  </script>
    <script>
      document.getElementById('breadcrumbs').innerHTML = renderBreadcrumbs([{'label': 'Inicio', 'url': '/'}, {'label': 'Registrarse', 'url': null}]);
    </script>
  </body>
</html>
