# nginx.conf - AgendaZonal Production Configuration
#
# Place this in /etc/nginx/sites-available/agendazonal
# Then symlink to sites-enabled and restart nginx
#
# This configuration provides:
# - Reverse proxy to Uvicorn
# - Rate limiting
# - Security headers (additional to FastAPI middleware)
# - Connection limiting

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=register_limit:10m rate=1r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name localhost;
    
    # Security headers (in addition to FastAPI middleware)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Connection limit
    limit_conn addr 50;
    
    # Client body size (max 10MB for image uploads)
    client_max_body_size 10M;
    
    # Proxy timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Rate limiting - apply to different endpoints
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/auth/register {
        limit_req zone=register_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static files (if not using FastAPI static)
    location /static/ {
        alias /var/www/agenda/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Frontend SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}

