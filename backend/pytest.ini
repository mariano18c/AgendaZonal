[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Coverage targets by category:
# - unit + integration: 90% (core functionality)
# - security (owasp, api_security, fuzzing, chaos): no fail-under (behavioral tests)
# - accessibility: no fail-under (UI-focused tests)
# - robustness: 85% (edge case coverage)
# - performance: no fail-under (load testing)
# Default: 85% for general runs

addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
    --timeout=30
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=85
    --no-cov-on-fail

markers =
    unit: Unit tests — schemas, models, pure functions
    integration: Integration tests — full HTTP request/response cycles
    security: Security tests — SQLi, XSS, auth bypass, fuzzing, ethical hacking
    slow: Slow tests — image processing, file uploads
    regression: Regression tests for fixed bugs
    smoke: Smoke tests — verify app boots and basic health
    robustness: Robustness tests — SQLite lock, upload validation, JWT edge cases, special chars
    data_exfil: Data exfiltration prevention tests
    dos: Denial-of-service resistance tests
    owasp: OWASP Top 10 security tests
    api_security: Advanced API security tests
    fuzzing: Fuzzing tests — protocol, API, web, database fuzzing
    performance: Performance and load testing
    accessibility: Accessibility tests — WCAG, screen reader, keyboard navigation
    chaos: Chaos engineering and resilience tests

filterwarnings =
    ignore::DeprecationWarning:bcrypt
    ignore::DeprecationWarning:starlette.*
    ignore::PendingDeprecationWarning:multipart.*
    ignore::DeprecationWarning:fastapi.*
    ignore::DeprecationWarning:slowapi.*
    ignore:pkg_resources is deprecated:DeprecationWarning
    ignore:datetime.datetime.utcnow:DeprecationWarning