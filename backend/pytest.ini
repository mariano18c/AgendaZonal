[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
    --timeout=30

markers =
    unit: Tests unitarios de schemas, modelos y funciones puras
    integration: Tests de integracion con endpoints HTTP
    security: Tests de seguridad (SQLi, XSS, auth bypass, fuzzing, ethical hacking)
    slow: Tests que pueden tomar mas tiempo (imagenes, paginas)
    regression: Tests de regresion para bugs corregidos
    smoke: Tests basicos de humo para verificar que la app arranca
    robustness: Tests de robustez (SQLite lock, upload validation, JWT edge cases, special chars)
    data_exfil: Tests de prevencion de exfiltracion de datos

filterwarnings =
    ignore::DeprecationWarning:bcrypt
    ignore::DeprecationWarning:starlette.*
    ignore::PendingDeprecationWarning:multipart.*
    ignore::DeprecationWarning:fastapi.*
