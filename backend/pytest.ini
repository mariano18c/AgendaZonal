[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
    --timeout=30
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=90

markers =
    unit: Unit tests — schemas, models, pure functions
    integration: Integration tests — full HTTP request/response cycles
    security: Security tests — SQLi, XSS, auth bypass, fuzzing, ethical hacking
    slow: Slow tests — image processing, file uploads
    regression: Regression tests for fixed bugs
    smoke: Smoke tests — verify app boots and basic health
    robustness: Robustness tests — SQLite lock, upload validation, JWT edge cases, special chars
    data_exfil: Data exfiltration prevention tests
    dos: Denial-of-service resistance tests

filterwarnings =
    ignore::DeprecationWarning:bcrypt
    ignore::DeprecationWarning:starlette.*
    ignore::PendingDeprecationWarning:multipart.*
    ignore::DeprecationWarning:fastapi.*
    ignore::DeprecationWarning:slowapi.*
    ignore:pkg_resources is deprecated:DeprecationWarning
    ignore:datetime.datetime.utcnow:DeprecationWarning