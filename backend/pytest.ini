[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --color=yes --strict-markers
timeout = 30
markers =
    unit: Tests unitarios de schemas y modelos
    integration: Tests de integracion con endpoints
    security: Tests de seguridad
    slow: Tests que pueden tomar mas tiempo
